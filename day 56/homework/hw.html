<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>JavaScript დავალებები</title>
</head>
<body>

  <p id="text">საწყისი ტექსტი</p>
  <button onclick="changeText()">ტექსტის შეცვლა</button>

  <h1 id="title">სათაური</h1>
  <button onclick="changeColor()">ფერის შეცვლა</button>

  <div id="box" style="width:100px; height:100px; background-color:gray;"></div>
  <button onclick="changeBackground()">ფონის შეცვლა</button>

  <br><br>
  <img id="image" src="dog.png" width="150">
  <br>
  <button onclick="changeImage()">სურათის შეცვლა</button>

  <p id="sizeText">ტექსტი</p>
  <button onclick="increaseSize()">ზომის გაზრდა</button>

<script src="hw.js"></script>

</body>
</html>
